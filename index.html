<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IPM Game Web</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg,#120a3a,#1b0f55);
    color: white;
    text-align: center;
}

/* ---------------- MENU ---------------- */
#menu {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.logo {
    font-size: 70px;
    color: #b45cff;
    font-weight: bold;
    text-shadow: 0 0 20px #b45cff;
}

.sub {
    color: #00ffe5;
    margin-bottom: 30px;
    font-size: 18px;
}

input {
    padding: 12px;
    width: 220px;
    border-radius: 12px;
    border: none;
    text-align: center;
    margin-bottom: 10px;
}

button {
    padding: 12px 30px;
    background: #00ffe5;
    border: none;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 15px #00ffe5;
    transition: 0.2s;
}
button:hover{
    transform: scale(1.05);
}

/* ---------------- GAME ---------------- */
#game {
    display: none;
}

canvas {
    background: #1a123f;
    border: 3px solid #b45cff;
    box-shadow: 0 0 20px #b45cff;
}

/* ---------------- GAME OVER ---------------- */
#gameover {
    display: none;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
    <div class="logo">IPM GAME</div>
    <div class="sub">Manufacturing Club Edition</div>

    <input id="nameInput" placeholder="Enter your name">
    <button onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game">
    <canvas id="c" width="800" height="300"></canvas>
</div>

<!-- GAME OVER -->
<div id="gameover">
    <h1 style="color:#b45cff">GAME OVER</h1>
    <h2 id="scoreText"></h2>

    <button onclick="restart()">Play Again</button>
    <button onclick="newPlayer()">New Player</button>

    <h3 style="color:#00ffe5">🏆 TOP 3</h3>
    <div id="leaderboard"></div>
</div>

<script>

// ---------------- VARIABLES ----------------
let canvas = document.getElementById("c");
let ctx = canvas.getContext("2d");

let player, obstacle, score, speed, name;
let gameRunning = false;
let obstacleType = 0;

let board = JSON.parse(localStorage.getItem("leaderboard")) || [];

// ---------------- START ----------------
function startGame(){
    name = document.getElementById("nameInput").value || "Player";

    document.getElementById("menu").style.display = "none";
    document.getElementById("game").style.display = "block";

    resetGame();
    gameRunning = true;
    loop();
}

// ---------------- RESET ----------------
function resetGame(){
    player = {x:50,y:220,w:35,h:35,vy:0,grounded:true};
    obstacle = {x:800,y:230,w:40,h:50};
    obstacleType = Math.floor(Math.random()*2);
    score = 0;
    speed = 6;
}

// ---------------- INPUT ----------------
document.addEventListener("keydown", e=>{
    if(e.code === "Space") jump();
});

function jump(){
    if(player.grounded){
        player.vy = -15;
        player.grounded = false;
    }
}

// ---------------- LOOP ----------------
function loop(){
    if(!gameRunning) return;

    update();
    draw();

    requestAnimationFrame(loop);
}

// ---------------- UPDATE ----------------
function update(){

    speed += 0.002;

    player.vy += 1.2;
    player.y += player.vy;

    if(player.y >= 220){
        player.y = 220;
        player.vy = 0;
        player.grounded = true;
    }

    obstacle.x -= speed;

    if(obstacle.x < -50){
        obstacle.x = 800;
        score++;
        obstacleType = Math.floor(Math.random()*2);
    }

    // collision
    if(
        player.x < obstacle.x + obstacle.w &&
        player.x + player.w > obstacle.x &&
        player.y < obstacle.y + obstacle.h &&
        player.y + player.h > obstacle.y
    ){
        gameOver();
    }
}

// ---------------- DRAW ----------------
function draw(){

    ctx.clearRect(0,0,800,300);

    // background grid
    ctx.strokeStyle = "#2a1a70";
    for(let x=0;x<800;x+=50){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,300);
        ctx.stroke();
    }

    // ground
    ctx.fillStyle="#00ffe5";
    ctx.fillRect(0,260,800,5);

    // player (styled)
    // player animation frame
let t = Date.now() / 100;

// جسم الشخصية
ctx.fillStyle="#00ffe5";
ctx.fillRect(player.x, player.y, player.w, player.h);

// إطار
ctx.strokeStyle="white";
ctx.strokeRect(player.x, player.y, player.w, player.h);

// 👀 عيون تتحرك خفيف
ctx.fillStyle="black";
let eyeOffset = Math.sin(t) * 2;
ctx.fillRect(player.x+8+eyeOffset, player.y+10, 5, 5);
ctx.fillRect(player.x+20+eyeOffset, player.y+10, 5, 5);

// 🦶 رجلين تتحرك
let legMove = Math.sin(t * 5) * 5;

ctx.fillStyle="#00ffe5";
ctx.fillRect(player.x+5, player.y+player.h, 6, 10 + legMove);
ctx.fillRect(player.x+player.w-11, player.y+player.h, 6, 10 - legMove);

    // eyes 😂
    ctx.fillStyle="black";
    ctx.fillRect(player.x+8,player.y+10,5,5);
    ctx.fillRect(player.x+20,player.y+10,5,5);

    // obstacle styles
    ctx.fillStyle="#b45cff";

    if(obstacleType === 0){
        // square
        ctx.fillRect(obstacle.x,obstacle.y,obstacle.w,obstacle.h);
    } else {
        // spike
        ctx.beginPath();
        ctx.moveTo(obstacle.x,260);
        ctx.lineTo(obstacle.x+20,220);
        ctx.lineTo(obstacle.x+40,260);
        ctx.fill();
    }

    // score
    ctx.fillStyle="white";
    ctx.font="16px Arial";
    ctx.fillText("Score: "+score,20,20);
}

// ---------------- GAME OVER ----------------
function gameOver(){

    gameRunning = false;

    saveScore();

    document.getElementById("game").style.display = "none";
    document.getElementById("gameover").style.display = "block";

    document.getElementById("scoreText").innerText =
        name + " Score: " + score;

    showBoard();
}

// ---------------- SAVE ----------------
function saveScore(){

    let found = board.find(p=>p.name===name);

    if(found){
        if(score > found.score){
            found.score = score;
        }
    } else {
        board.push({name:name, score:score});
    }

    localStorage.setItem("leaderboard", JSON.stringify(board));
}

// ---------------- BOARD ----------------
function showBoard(){

    board.sort((a,b)=>b.score-a.score);

    let html = "";

    for(let i=0;i<Math.min(3,board.length);i++){
        html += `<p>${i+1}. ${board[i].name} - ${board[i].score}</p>`;
    }

    document.getElementById("leaderboard").innerHTML = html;
}

// ---------------- RESTART ----------------
function restart(){
    document.getElementById("gameover").style.display="none";
    document.getElementById("game").style.display="block";

    resetGame();
    gameRunning = true;
    loop();
}

// ---------------- NEW PLAYER ----------------
function newPlayer(){
    location.reload();
}

</script>

</body>
</html>
